<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservoir Overview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { width: 100%; max-width: 640px; margin: 0 auto; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .topbar a { color: #fff; text-decoration: none; font-weight: 600; font-size: 14px; }
        h1 { color: #fff; font-size: 22px; margin-bottom: 16px; text-align: center; }
        .card {
            background: #fff; border-radius: 10px; padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 18px;
        }
        .summary { background: #f5f7ff; }
        .summary p { font-size: 16px; color: #333; margin: 4px 0; font-weight: 600; }
        .summary span { color: #16a085; }
        .section-title { font-weight: 700; color: #555; margin-bottom: 12px; font-size: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #eef2ff; color: #2d3a66; font-weight: 700; }
        td.num, th.num { text-align: right; }
        .nodata { color: #c0392b; font-weight: 600; text-align: right; }
        .btn {
            display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; border: none; padding: 12px 18px; border-radius: 6px;
            font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none;
        }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .actions { text-align: center; margin-bottom: 20px; }
        .loading { color: #fff; text-align: center; }
        .controls {
            display: flex; gap: 12px; align-items: flex-end; justify-content: center;
            flex-wrap: wrap; margin-bottom: 20px;
        }
        .controls .field { display: flex; flex-direction: column; }
        .controls label { color: #fff; font-weight: 600; font-size: 13px; margin-bottom: 6px; }
        .controls input[type="date"] {
            padding: 10px 12px; border: none; border-radius: 6px; font-size: 14px; font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <a href="/">&larr; Submit data</a>
            <a href="/overview">Refresh</a>
        </div>
        <h1>Daily Reservoir Overview</h1>

        <div class="controls">
            <div class="field">
                <label for="dateInput">Select date</label>
                <input type="date" id="dateInput">
            </div>
            <button id="downloadBtn" class="btn">Download Excel</button>
        </div>

        <div id="content" class="loading">Loading…</div>
    </div>

    <script src="/js/overview.js"></script>
</body>
</html>
